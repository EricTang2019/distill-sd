hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

# waste_sd v1 is actor-only distillation.
critic:
  enable: false

reward_model:
  enable: false
  use_reward_loop: false

algorithm:
  use_kl_in_reward: false

trainer:
  val_before_train: false
  exact_blocks_eval_freq: -1
  exact_blocks_eval_data_file: null
  exact_blocks_eval_batch_size: 64
  exact_blocks_eval_max_samples: -1
  exact_blocks_eval_max_prompt_length: 1024
  exact_blocks_eval_max_response_length: 2048
  exact_blocks_eval_truncation: right
  exact_blocks_eval_temperature: 1.0

actor_rollout_ref:
  actor:
    use_kl_loss: false
  rollout:
    mode: async
    name: sglang

distill:
  # training data source:
  # - online_rollout: generate responses with rollout engine (default)
  # - offline_teacher_rollout: read prompt/response/(prompt_ids,response_ids) from dataset
  data_mode: online_rollout # online_rollout | offline_teacher_rollout
  # divergence between teacher target distribution q and student distribution p
  loss_type: fkl # fkl | rkl | tvd | teacher_greedy_nll | exact_block_count_wnll
  # Token weighting rule for dense distillation.
  # teacher_greedy_nll and exact_block_count_wnll currently require uniform_mean.
  weighting_mode: waste # waste | uniform_mean | remaining_budget_forward
  # Optional KL floor coefficient for forward-only remaining-budget weighted soft distillation.
  kl_floor_coef: 0.0
  # Objective mode for remaining-budget TVD.
  # weighted_mean keeps the existing detached weighted token-mean objective.
  # theorem_unnormalized switches to the strict theorem form
  #   mean_i[T_i/(gamma+1) + gamma/(gamma+1) * sum_n w_{i,n}^rem * TVD_{i,n}]
  # with full autodiff through w^rem.
  rembudget_tvd_objective_mode: weighted_mean # weighted_mean | theorem_unnormalized
  # Optional backward-only length normalization for theorem_unnormalized:
  # divide the mini-batch theorem objective by the batch average valid response length,
  # i.e. optimize sum_i theorem_i / sum_i T_i instead of sum_i theorem_i / B.
  rembudget_tvd_backward_length_normalize: false
  # Optional convex mixing coefficient for forward-only remaining-budget weighted dense loss.
  # Only used when weighting_mode=remaining_budget_forward and loss_type in {fkl, tvd}.
  #   loss = (1 - rembudget_unweighted_kl_coef) * rembudget_loss + rembudget_unweighted_kl_coef * unweighted_loss
  rembudget_unweighted_kl_coef: 0.0
  rembudget_unweighted_kl_coef_schedule: constant # constant | linear
  rembudget_unweighted_kl_coef_start: ${distill.rembudget_unweighted_kl_coef}
  rembudget_unweighted_kl_coef_end: ${distill.rembudget_unweighted_kl_coef}
  rembudget_unweighted_kl_coef_start_step: 0
  rembudget_unweighted_kl_coef_end_step: 0
  # Optional convex mixing coefficient for forward-only remaining-budget TVD + unweighted FKL.
  # Only used when weighting_mode=remaining_budget_forward and loss_type=tvd.
  #   loss = (1 - rembudget_tvd_unweighted_fkl_coef) * rembudget_tvd
  #        + rembudget_tvd_unweighted_fkl_coef * unweighted_fkl
  rembudget_tvd_unweighted_fkl_coef: 0.0
  rembudget_tvd_unweighted_fkl_coef_schedule: constant # constant | linear
  rembudget_tvd_unweighted_fkl_coef_start: ${distill.rembudget_tvd_unweighted_fkl_coef}
  rembudget_tvd_unweighted_fkl_coef_end: ${distill.rembudget_tvd_unweighted_fkl_coef}
  rembudget_tvd_unweighted_fkl_coef_start_step: 0
  rembudget_tvd_unweighted_fkl_coef_end_step: 0
  # Optional mild remaining-budget bias on top of uniform-mean TVD.
  # Only used when weighting_mode=uniform_mean and loss_type=tvd.
  #   loss = mean_n[ a_n * TVD_n ]
  # where a_n is a detached, centered, one-sided boost.
  # score_type=rembudget uses softened rembudget weights; score_type=rembudget_tvd
  # uses detached rembudget * detached token-TVD, and ignores power/eps.
  tvd_rembudget_bias_score_type: rembudget # rembudget | rembudget_tvd
  tvd_rembudget_bias_coef: 0.0
  tvd_rembudget_bias_power: 1.0
  tvd_rembudget_bias_eps: 1e-3
  tvd_rembudget_bias_clip: 0.5
  tvd_rembudget_bias_start_step: 0
  # Optional current-batch theorem-style RB-TVD diagnostic:
  #   T/(gamma+1) + (gamma/(gamma+1)) * sum_n w_n^rem * TVD_n
  # Logged only as a metric; does not affect optimization.
  log_current_batch_theorem_rb_tvd: false
  # Optional post-update theorem-style RB-TVD diagnostic on the same mini-batch
  # immediately after optimizer.step(). Logged only as a metric.
  # Used for any TVD run so unweighted and rembudget can be compared fairly.
  log_post_update_batch_theorem_rb_tvd: false
  # Optional convex mixing coefficient for exact omega + unweighted auxiliary loss.
  # Only used when loss_type=exact_block_count_wnll.
  #   loss = (1 - exact_unweighted_aux_coef) * exact_wNLL + exact_unweighted_aux_coef * unweighted_aux
  exact_unweighted_aux_loss_type: fkl # fkl | tvd
  exact_unweighted_aux_coef: 0.0
  exact_unweighted_aux_coef_schedule: constant # constant | linear
  exact_unweighted_aux_coef_start: ${distill.exact_unweighted_aux_coef}
  exact_unweighted_aux_coef_end: ${distill.exact_unweighted_aux_coef}
  exact_unweighted_aux_coef_start_step: 0
  exact_unweighted_aux_coef_end_step: 0
  # teacher forward backend used inside distill update
  # - fsdp_ref: use ref FSDP module directly (default, existing behavior)
  # - local_replica: per-rank local teacher replica, no FSDP collectives on teacher forward
  teacher_forward_backend: fsdp_ref # fsdp_ref | local_replica
  # rollout target model source: local_ref (teacher) or actor (student)
  rollout_target: local_ref # local_ref | actor
  # Teacher off-policy baselines may require an explicit ref model path.
  off_policy_require_ref: false
  # default follows speculative draft-step cap gamma
  gamma: ${oc.select:actor_rollout_ref.rollout.engine_kwargs.sglang.speculative_num_steps,3}
  strict: true
  q_source: local_ref
  staleness_max_version_gap: 1
  forward_path: auto # auto | padded_only | remove_padding
  debug:
    enable: false
    dump_dir: ${oc.env:WASTE_SD_DISTILL_DEBUG_DIR,/work5/jingwut/On-Policy-Distillation/verl/outputs/waste_sd_debug/default}
    max_samples_per_step: 8
    max_tokens_per_sample: 128
    include_topk: false
